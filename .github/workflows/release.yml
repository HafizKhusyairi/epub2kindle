name: Release

on:
  workflow_dispatch:   # manual trigger button on GitHub Actions tab (for testing)
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: epub2kindle
            asset_name: epub2kindle-linux

          - os: windows-latest
            artifact_name: epub2kindle.exe
            asset_name: epub2kindle-windows.exe

          - os: macos-latest
            artifact_name: epub2kindle
            asset_name: epub2kindle-macos-arm64

          - os: macos-13
            artifact_name: epub2kindle
            asset_name: epub2kindle-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package and build tools
        run: |
          pip install --upgrade pip
          pip install .
          pip install "pyinstaller>=6.0" "pyinstaller-hooks-contrib>=2024.0"

      - name: Build standalone executable
        run: pyinstaller epub2kindle.spec

      - name: Rename artifact (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv dist/epub2kindle dist/${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist\epub2kindle.exe dist\${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          fail_on_unmatched_files: true
